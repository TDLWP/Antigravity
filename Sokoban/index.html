<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Retro Sokoban Mobile</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#8fa886">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; touch-action: manipulation; }
    body {
        margin: 0; background-color: #1a1a1a; display: flex; 
        justify-content: center; align-items: center; 
        min-height: 100vh; font-family: sans-serif;
        overflow: hidden;
    }
    #phone-casing {
        width: 300px; height: 620px;
        background: linear-gradient(145deg, #3d424b, #22252a);
        border-radius: 40px; border: 3px solid #6c7380;
        box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 5px 15px rgba(255,255,255,0.1);
        display: flex; flex-direction: column; align-items: center;
        position: relative;
    }
    #earpiece {
        width: 60px; height: 8px; background: #0b0c0e;
        border-radius: 4px; margin: 25px 0 15px;
        box-shadow: inset 0px 2px 4px rgba(0,0,0,0.8);
    }
    #screen-bezel {
        background: #000; padding: 15px 15px 30px 15px;
        border-radius: 15px; box-shadow: inset 0 2px 10px rgba(0,0,0,1);
        position: relative; border: 2px solid #2a2a2a;
    }
    .brand {
        position: absolute; bottom: 8px; left: 0; width: 100%;
        text-align: center; color: #d0d0d0; font-size: 10px;
        letter-spacing: 2px; font-weight: bold; font-family: 'Press Start 2P', monospace;
    }
    canvas {
        background: #8fa886; /* Couleur écran LCD Nokia/Gameboy */
        display: block; image-rendering: pixelated;
        width: 176px; height: 220px; border-radius: 2px;
        box-shadow: inset 0px 0px 10px rgba(0,0,0,0.3);
    }
    #keypad {
        display: flex; flex-direction: column; align-items: center;
        width: 100%; flex: 1; justify-content: center; gap: 15px;
        padding-top: 10px;
    }
    .soft-keys {
        display: flex; justify-content: space-between; width: 220px;
    }
    .soft-btn {
        width: 70px; height: 25px; background: #c3c4c9;
        border-radius: 10px 10px 0 0; box-shadow: 0 4px #818388;
        display: flex; justify-content: center; align-items: center;
        font-size: 16px; font-weight: bold; cursor: pointer; color: #333;
    }
    .soft-btn:active, .nav-btn:active {
        box-shadow: 0 1px #818388; transform: translateY(3px);
    }
    .nav-cluster {
        display: grid; grid-template-columns: 60px 60px 60px; 
        grid-template-rows: 45px 45px 45px; gap: 6px;
    }
    .nav-btn {
        background: #c3c4c9; border-radius: 8px;
        box-shadow: 0 4px #818388; display: flex; 
        justify-content: center; align-items: center;
        font-weight: bold; font-size: 20px; cursor: pointer; color: #222;
        user-select: none;
    }
    .nav-btn.center { border-radius: 15px; background: #a2aab8; box-shadow: 0 4px #5c6370; }
    .nav-btn.center:active { box-shadow: 0 1px #5c6370; }
</style>
</head>
<body>

<div id="phone-casing">
    <div id="earpiece"></div>
    <div id="screen-bezel">
        <canvas id="screen" width="176" height="220"></canvas>
        <div class="brand">SOKIA</div>
    </div>
    
    <div id="keypad">
        <div class="soft-keys">
            <div class="soft-btn" onpointerdown="inp('LSOFT')">-</div>
            <div class="soft-btn" onpointerdown="inp('RSOFT')">-</div>
        </div>
        <div class="nav-cluster">
            <div></div><div class="nav-btn" onpointerdown="inp('U')">▲</div><div></div>
            <div class="nav-btn" onpointerdown="inp('L')">◀</div>
            <div class="nav-btn center" onpointerdown="inp('OK')">OK</div>
            <div class="nav-btn" onpointerdown="inp('R')">▶</div>
            <div></div><div class="nav-btn" onpointerdown="inp('D')">▼</div><div></div>
        </div>
    </div>
</div>

<script>
// --- DONNÉES ET NIVEAUX ---
const L = [
"####|# .#|#  ###|#*@  #|#  $ #|#  ###|####",
"#######|#     #|# .$. #|### ###|# $@$ #|#     #|#######",
" ####| #  #| # .$|##@##|# $ #|# . #|#####",
"  ####|  #  #|###  #|# $  ###|# #@ . #|#    ###|######",
"  #####|  #   #|  #$# #|### # #|#.$ @ #|#.#   #|#######",
" ####| #  ###| # $  #|## #$ #|# . . #|#  @  #|#######",
"#######|#  .  #|# #$# #|# $.$ #|# # # #|#  @  #|#######",
"#####|#   #|# $ ###|#@$.  #|###   #|  #####",
"######|#    #|# #$ #|# .. #|##$# #|# @  #|######",
"  #####|  #   #|  #$  #|### $@#|# .*  #|# .   #|#######",
"#######|#     #|# # $ #|# . # #|###$###| # @ #| #####",
"#####|#   #|# $ #|#  $#|##. #|#@ .#|#####",
"####|#  #|#  ###|#   . #|# # $ #|#   @ #|#######",
"#####|#   #|# $ #|#$. ###|##.$  #| # @  #| ######",
"####|#  #|# .###|## $ #|# $  #|#..@ #|######"
];

// --- MOTEUR AUIO 8-BIT ---
let A;
function sfx(t) {
    if(!A) { A = new (window.AudioContext || window.webkitAudioContext)(); }
    if(A.state === 'suspended') A.resume();
    let o = A.createOscillator(), g = A.createGain(), n = A.currentTime;
    o.connect(g); g.connect(A.destination);
    
    if(t=='mv') {
        o.type='square'; o.frequency.setValueAtTime(150, n); o.frequency.exponentialRampToValueAtTime(100, n+0.05);
        g.gain.setValueAtTime(0.05, n); g.gain.linearRampToValueAtTime(0, n+0.05); o.start(n); o.stop(n+0.05);
    } else if(t=='psh') {
        o.type='triangle'; o.frequency.setValueAtTime(200, n); o.frequency.linearRampToValueAtTime(80, n+0.1);
        g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n+0.1); o.start(n); o.stop(n+0.1);
    } else if(t=='err') {
        o.type='sawtooth'; o.frequency.setValueAtTime(80, n); g.gain.setValueAtTime(0.1, n); 
        g.gain.linearRampToValueAtTime(0, n+0.1); o.start(n); o.stop(n+0.1);
    } else if(t=='win') {
        o.type='square'; o.frequency.setValueAtTime(440, n); o.frequency.setValueAtTime(554, n+0.1); 
        o.frequency.setValueAtTime(659, n+0.2); g.gain.setValueAtTime(0.1, n); 
        g.gain.linearRampToValueAtTime(0, n+0.5); o.start(n); o.stop(n+0.5);
    }
}

// --- VARIABLES GLOBALES ET LOGIQUE DE JEU ---
const cvs = document.getElementById("screen"), ctx = cvs.getContext("2d");
ctx.imageSmoothingEnabled = false;

let state = "TITLE"; // TITLE, MENU, LEVEL_SEL, PLAY, PAUSE, WIN, END
let menuSel = 0, lvlSel = 0;
let unlockedLvls = localStorage.getItem('soko_retro_unlocked') ? parseInt(localStorage.getItem('soko_retro_unlocked')) : 1, curLvl = 0;
let movs = 0, pshs = 0, map = [], hist = [], px = 0, py = 0;
let tw = 12, offX = 0, offY = 0;

function loadMap(idx) {
    let raw = L[idx].split('|');
    map = []; hist = []; movs = 0; pshs = 0; curLvl = idx;
    let maxCols = 0;
    for(let r=0; r<raw.length; r++) { maxCols = Math.max(maxCols, raw[r].length); }
    for(let r=0; r<raw.length; r++) {
        let row = raw[r].split('');
        while(row.length < maxCols) row.push(' ');
        map.push(row);
        for(let c=0; c<row.length; c++) {
            if(row[c]=='@' || row[c]=='+') { px = c; py = r; }
        }
    }
    tw = Math.min(176 / maxCols, 170 / map.length);
    offX = (176 - (maxCols * tw)) / 2; offY = 24 + (170 - (map.length * tw)) / 2;
    state = "PLAY"; draw();
}

function get(x,y) { return (y>=0 && y<map.length && x>=0 && x<map[y].length) ? map[y][x] : ' '; }
function set(x,y,v) { map[y][x] = v; }

function saveHist() {
    hist.push({ m: map.map(r=>[...r]), px: px, py: py, movs: movs, pshs: pshs });
    if(hist.length > 50) hist.shift();
}

function tryMove(dx, dy) {
    let nx = px+dx, ny = py+dy;
    let t1 = get(nx,ny);
    if(t1=='#' || t1==' ') { sfx('err'); return; }
    
    if(t1=='$' || t1=='*') {
        let nnx = nx+dx, nny = ny+dy;
        let t2 = get(nnx,nny);
        if(t2=='.' || t2==' ') {
            saveHist();
            set(nx,ny, t1=='*' ? '.' : ' ');
            set(nnx,nny, t2=='.' ? '*' : '$');
            updPlayer(nx, ny); pshs++; movs++; sfx('psh'); checkWin();
        } else sfx('err');
    } else {
        saveHist(); updPlayer(nx, ny); movs++; sfx('mv');
    }
    draw();
}

function updPlayer(nx, ny) {
    set(px, py, get(px,py)=='+' ? '.' : ' ');
    set(nx, ny, get(nx,ny)=='.' ? '+' : '@');
    px = nx; py = ny;
}

function checkWin() {
    let won = true;
    for(let r of map) for(let c of r) if(c=='$') won = false;
    if(won) {
        sfx('win'); state = "WIN";
        if(curLvl + 1 >= unlockedLvls && unlockedLvls < L.length) {
            unlockedLvls++;
            localStorage.setItem('soko_retro_unlocked', unlockedLvls);
        }
    }
}

function undo() {
    if(hist.length == 0) return sfx('err');
    let h = hist.pop();
    map = h.m.map(r=>[...r]); px = h.px; py = h.py; movs = h.movs; pshs = h.pshs;
    draw();
}

function inp(k) {
    if(state == "TITLE") { state = "MENU"; draw(); return; }
    if(state == "MENU") {
        if(k=='U') menuSel = (menuSel>0) ? menuSel-1 : 2;
        if(k=='D') menuSel = (menuSel<2) ? menuSel+1 : 0;
        if(k=='OK' || k=='LSOFT') {
            if(menuSel==0) loadMap(unlockedLvls-1);
            if(menuSel==1) { state = "LEVEL_SEL"; lvlSel = unlockedLvls-1; }
            if(menuSel==2) state = "ABOUT";
        }
    }
    else if(state == "LEVEL_SEL") {
        if(k=='L' && lvlSel > 0) lvlSel--;
        if(k=='R' && lvlSel < L.length-1) lvlSel++;
        if(k=='U' && lvlSel >= 5) lvlSel-=5;
        if(k=='D' && lvlSel+5 < L.length) lvlSel+=5;
        if((k=='OK' || k=='LSOFT') && lvlSel < unlockedLvls) loadMap(lvlSel);
        if(k=='RSOFT') state = "MENU";
    }
    else if(state == "PLAY") {
        if(k=='U') tryMove(0,-1); if(k=='D') tryMove(0,1);
        if(k=='L') tryMove(-1,0); if(k=='R') tryMove(1,0);
        if(k=='LSOFT' || k=='ESC') state = "PAUSE";
        if(k=='RSOFT') undo();
    }
    else if(state == "PAUSE") {
        if(k=='U') menuSel = (menuSel>0) ? menuSel-1 : 2;
        if(k=='D') menuSel = (menuSel<2) ? menuSel+1 : 0;
        if(k=='OK' || k=='LSOFT') {
            if(menuSel==0) state="PLAY";
            if(menuSel==1) loadMap(curLvl);
            if(menuSel==2) { state="MENU"; menuSel=0; }
        }
    }
    else if(state == "WIN") {
        if(k=='OK' || k=='LSOFT' || k=='RSOFT') {
            if(curLvl+1 < L.length) loadMap(curLvl+1);
            else state = "END";
        }
    }
    else if(state == "ABOUT" || state == "END") {
        if(k) state = "MENU";
    }
    draw();
}

document.addEventListener('keydown', e => {
    let mk = { "ArrowUp":"U", "ArrowDown":"D", "ArrowLeft":"L", "ArrowRight":"R", "w":"U", "s":"D", "a":"L", "d":"R",
               "Enter":"OK", "Escape":"ESC", "u":"RSOFT", "r":"RSTART", " ":"OK" }[e.key];
    if(mk) { inp(mk); e.preventDefault(); }
});

// --- RENDU GRAPHIQUE ---
function txt(t, x, y, size, align="left", col="#000") {
    ctx.font = `${size}px 'Press Start 2P', monospace`;
    ctx.textAlign = align; ctx.fillStyle = col; ctx.fillText(t, x, y);
}

function draw() {
    ctx.fillStyle = "#8fa886"; ctx.fillRect(0,0,176,220); // BG

    if(state == "TITLE") {
        txt("SOKOBAN", 88, 80, 16, "center", "#111");
        txt("PRESS OK", 88, 140, 8, "center", "#333");
    }
    else if(state == "MENU") {
        txt("MAIN MENU", 88, 30, 10, "center");
        let opts = ["PLAY", "SELECT Lvl", "ABOUT"];
        opts.forEach((o,i) => {
            if(i==menuSel) { ctx.fillStyle="#000"; ctx.fillRect(20, 60+i*20-8, 136, 12); }
            txt(o, 88, 60+i*20, 8, "center", i==menuSel?"#fff":"#000");
        });
        txt("OK", 5, 215, 8, "left");
    }
    else if(state == "ABOUT") {
        txt("RETRO SOKOBAN", 88, 30, 8, "center");
        txt("A classic puzzle", 88, 60, 6, "center");
        txt("game demake.", 88, 70, 6, "center");
        txt("BACK", 171, 215, 8, "right");
    }
    else if(state == "LEVEL_SEL") {
        txt("LEVELS", 88, 20, 10, "center");
        for(let i=0; i<L.length; i++) {
            let cx = 25 + (i%5)*30, cy = 50 + Math.floor(i/5)*30;
            ctx.strokeStyle="#000"; ctx.strokeRect(cx-10, cy-10, 20, 20);
            if(i < unlockedLvls) txt((i+1)+"", cx, cy+3, 8, "center", i==lvlSel?"#fff":"#000");
            else { ctx.fillStyle="#444"; ctx.fillRect(cx-10, cy-10, 20, 20); }
            if(i==lvlSel && i<unlockedLvls) { ctx.fillStyle="#000"; ctx.fillRect(cx-10, cy-10, 20, 20); txt((i+1)+"", cx, cy+3, 8, "center", "#fff"); }
        }
        txt("OK", 5, 215, 8, "left"); txt("BACK", 171, 215, 8, "right");
    }
    else if(state == "PLAY") {
        ctx.fillStyle="#000"; ctx.fillRect(0,0,176,14); // Header
        txt(`LVL:${curLvl+1}`, 2, 10, 8, "left", "#fff");
        txt(`M:${movs} P:${pshs}`, 174, 10, 8, "right", "#fff");
        
        // Draw grid
        for(let y=0; y<map.length; y++) {
            for(let x=0; x<map[y].length; x++) {
                let pxlX = offX + x*tw, pxlY = offY + y*tw, t = map[y][x];
                if(t=='#') { ctx.fillStyle="#2b3327"; ctx.fillRect(pxlX,pxlY,tw,tw); ctx.fillStyle="#434f3b"; ctx.fillRect(pxlX+1,pxlY+1,tw-2,tw-2); }
                else if(t=='.') { ctx.fillStyle="#1a1a1a"; ctx.fillRect(pxlX+tw/2-1,pxlY+tw/2-1,2,2); }
                else if(t=='$') { ctx.fillStyle="#000"; ctx.fillRect(pxlX+1,pxlY+1,tw-2,tw-2); ctx.strokeStyle="#8fa886"; ctx.strokeRect(pxlX+3,pxlY+3,tw-6,tw-6); }
                else if(t=='*') { ctx.fillStyle="#1a1a1a"; ctx.fillRect(pxlX+1,pxlY+1,tw-2,tw-2); ctx.fillStyle="#8fa886"; ctx.fillRect(pxlX+4,pxlY+4,tw-8,tw-8); }
                else if(t=='@' || t=='+') { 
                    if(t=='+') { ctx.fillStyle="#1a1a1a"; ctx.fillRect(pxlX+tw/2-1,pxlY+tw/2-1,2,2); }
                    ctx.fillStyle="#000"; ctx.fillRect(pxlX+2,pxlY+2,tw-4,tw-4); 
                    ctx.fillStyle="#8fa886"; ctx.fillRect(pxlX+4,Math.floor(pxlY+tw/4),tw-8,2); // lunettes/visage
                }
            }
        }
        txt("MENU", 5, 215, 8, "left"); txt("UNDO", 171, 215, 8, "right");
    }
    else if(state == "PAUSE") {
        ctx.fillStyle="rgba(143,168,134,0.9)"; ctx.fillRect(20,40,136,100);
        ctx.strokeStyle="#000"; ctx.strokeRect(20,40,136,100);
        txt("PAUSE", 88, 60, 10, "center");
        let opts = ["RESUME", "RESTART", "EXIT"];
        opts.forEach((o,i) => {
            if(i==menuSel) { ctx.fillStyle="#000"; ctx.fillRect(30, 80+i*15-8, 116, 10); }
            txt(o, 88, 80+i*15, 8, "center", i==menuSel?"#fff":"#000");
        });
        txt("OK", 5, 215, 8, "left");
    }
    else if(state == "WIN") {
        ctx.fillStyle="rgba(143,168,134,0.9)"; ctx.fillRect(10,50,156,90);
        ctx.strokeStyle="#000"; ctx.lineWidth=2; ctx.strokeRect(10,50,156,90); ctx.lineWidth=1;
        txt("LEVEL CLEAR!", 88, 70, 10, "center");
        txt(`Moves: ${movs}`, 88, 95, 8, "center");
        txt(`Pushes: ${pshs}`, 88, 110, 8, "center");
        txt("NEXT", 171, 215, 8, "right");
    }
    else if(state == "END") {
        txt("CONGRATULATIONS", 88, 80, 10, "center");
        txt("YOU BEAT", 88, 110, 8, "center");
        txt("ALL LEVELS!", 88, 130, 8, "center");
        txt("MENU", 171, 215, 8, "right");
    }
}
window.onload = draw;

// --- ENREGISTREMENT SERVICE WORKER (PWA - HORS LIGNE) ---
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(
      r => console.log('Sokoban SW enregistré!'),
      e => console.log('Sokoban SW échec:', e)
    );
  });
}
</script>
</body>
</html>
